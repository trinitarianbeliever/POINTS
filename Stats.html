<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Arm Fast</title>
    <!-- Tailwind CSS for clean, light-themed styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 text-zinc-950 min-h-screen p-4 sm:p-6">

    <div class="max-w-4xl mx-auto bg-white rounded-xl border border-zinc-200 p-6 sm:p-8 shadow-sm">
        
        <!-- Main Stats Table -->
        <div class="overflow-x-auto rounded-lg border border-zinc-200">
            <table class="w-full text-left border-collapse bg-white">
                <thead>
                    <tr class="bg-zinc-50 border-b border-zinc-200 text-zinc-500 text-[10px] font-bold uppercase tracking-wider">
                        <th class="px-4 py-3">Matches</th>
                        <th class="px-4 py-3">Overs</th>
                        <th class="px-4 py-3">Balls</th>
                        <th class="px-4 py-3">Runs</th>
                        <th class="px-4 py-3">Wickets</th>
                        <th class="px-4 py-3">BBI</th>
                        <th class="px-4 py-3">Econ</th>
                        <th class="px-4 py-3">Average</th>
                    </tr>
                </thead>
                <tbody class="text-zinc-950 text-sm font-semibold divide-y divide-zinc-100">
                    <tr>
                        <td id="tblMatches" class="px-4 py-4 text-zinc-400">0</td>
                        <td id="tblOvers" class="px-4 py-4 font-bold">0</td>
                        <td id="tblBalls" class="px-4 py-4 text-zinc-400">0</td>
                        <td id="tblRuns" class="px-4 py-4">0</td>
                        <td id="tblWickets" class="px-4 py-4 font-bold">0</td>
                        <td id="tblBBI" class="px-4 py-4">-</td>
                        <td id="tblEcon" class="px-4 py-4">0.00</td>
                        <td id="tblAvg" class="px-4 py-4 font-bold">-</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        /*************************************************************************
         * EDIT YOUR SESSIONS HERE!
         * To update your statistics, simply add, change, or delete rows in this list.
         * * Use standard cricket notation for overs (e.g., 4 or 4.2 for 4 overs & 2 balls)
         *************************************************************************/
        const sessions = [
            { date: "2026-06-25", overs: 1,   runs: 33, wickets: 1 },
            { date: "2026-06-19", overs: 2,   runs: 28, wickets: 3 }
        ];
        /*************************************************************************/

        // DOM elements
        const tblMatches = document.getElementById('tblMatches');
        const tblOvers = document.getElementById('tblOvers');
        const tblBalls = document.getElementById('tblBalls');
        const tblRuns = document.getElementById('tblRuns');
        const tblWickets = document.getElementById('tblWickets');
        const tblBBI = document.getElementById('tblBBI');
        const tblEcon = document.getElementById('tblEcon');
        const tblAvg = document.getElementById('tblAvg');

        // Custom Over Parser to process decimal cricket notation correctly
        function parseOversToBalls(oversStr) {
            const num = parseFloat(oversStr);
            if (isNaN(num)) return 0;
            
            const parts = oversStr.toString().split('.');
            const mainOvers = parseInt(parts[0]) || 0;
            let balls = 0;
            
            if (parts.length > 1) {
                balls = parseInt(parts[1]) || 0;
            }
            
            return (mainOvers * 6) + balls;
        }

        // Convert total balls back to readable Overs decimal string representation
        function convertBallsToOvers(totalBalls) {
            const overs = Math.floor(totalBalls / 6);
            const remainingBalls = totalBalls % 6;
            return remainingBalls > 0 ? `${overs}.${remainingBalls}` : `${overs}`;
        }

        // Calculate and render stats
        function renderTracker() {
            let totalBalls = 0;
            let totalRuns = 0;
            let totalWickets = 0;
            
            // For calculating Best Bowling in Innings (BBI)
            let bestWickets = -1;
            let bestRuns = 999;
            let bbiString = "-";

            sessions.forEach(session => {
                const ballsInSession = parseOversToBalls(session.overs);
                totalBalls += ballsInSession;
                totalRuns += session.runs;
                totalWickets += session.wickets;

                // Calculate BBI (Highest wickets, then lowest runs if wickets are tied)
                if (session.wickets > bestWickets) {
                    bestWickets = session.wickets;
                    bestRuns = session.runs;
                } else if (session.wickets === bestWickets) {
                    if (session.runs < bestRuns) {
                        bestRuns = session.runs;
                    }
                }
            });

            if (bestWickets !== -1) {
                bbiString = `${bestWickets}/${bestRuns}`;
            }

            // Update Total Stats Elements
            const overallOversString = convertBallsToOvers(totalBalls);
            
            // Fill Cricinfo-style Career Table Row
            tblMatches.textContent = sessions.length;
            tblOvers.textContent = overallOversString;
            tblBalls.textContent = totalBalls;
            tblRuns.textContent = totalRuns;
            tblWickets.textContent = totalWickets;
            tblBBI.textContent = bbiString;

            // Calculate Economy Rate (Runs conceded / Overs bowled)
            if (totalBalls > 0) {
                const calculatedOversFraction = totalBalls / 6;
                const calculatedEcon = (totalRuns / calculatedOversFraction).toFixed(2);
                tblEcon.textContent = calculatedEcon;
            } else {
                tblEcon.textContent = "-";
            }

            // Calculate Bowling Average exactly as requested:
            // "multiply overs by six and divide from wickets" (Balls delivered divided by wickets)
            if (totalWickets > 0) {
                const avg = (totalBalls / totalWickets).toFixed(2);
                tblAvg.textContent = `${avg}b`;
            } else {
                tblAvg.textContent = "-";
            }
        }

        // Initialize and calculate on load
        renderTracker();
    </script>
</body>
</html>
